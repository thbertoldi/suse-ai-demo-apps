gateway:
  image:
    repository: ghcr.io/thbertoldi/suse-ai-demo-gateway
    tag: latest
    pullPolicy: Always
  replicas: 1
  ragServiceAddr: rag-service:50052
  llmServiceAddr: llm-service:50053
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

ragService:
  image:
    repository: ghcr.io/thbertoldi/suse-ai-demo-rag-service
    tag: latest
    pullPolicy: Always
  replicas: 1
  llm:
    baseUrl: http://ollama.suse-private-ai.svc.cluster.local:11434
    model: llama3
    provider: ollama
  embedding:
    baseUrl: http://ollama.suse-private-ai.svc.cluster.local:11434
    model: nomic-embed-text
  vectorDb:
    type: qdrant
    url: http://qdrant.suse-private-ai.svc.cluster.local:6333
    collection: demo-docs
  enableContentEvents: "false"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

llmService:
  image:
    repository: ghcr.io/thbertoldi/suse-ai-demo-llm-service
    tag: latest
    pullPolicy: Always
  replicas: 1
  llm:
    baseUrl: http://vllm-router-service.suse-private-ai.svc.cluster.local:80/v1
    model: llama3
    provider: vllm
  enableContentEvents: "false"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

trafficGen:
  image:
    repository: ghcr.io/thbertoldi/suse-ai-demo-traffic-gen
    tag: latest
    pullPolicy: Always
  enabled: true
  gatewayAddr: gateway:50051
  intervalSeconds: "5"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

otel:
  exporterEndpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317gateway:
